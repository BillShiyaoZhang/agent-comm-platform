platform:
  mode: "privacy"      # "privacy" | "compliance"
  data_dir: "./data"
  store_user_data: true             # Whether the platform itself stores user envelopes (e.g. offline messages in MQ)
  forward_to_storage_platforms: true # Whether the platform allows forwarding/connecting to other platforms that store user data
  history_retention_days: 30        # How many days to keep delivered/read historical messages in the queue (0 to delete immediately)

identity:
  keys_dir: "./data/keys"

libp2p:
  listen_addrs:
    - "/ip4/0.0.0.0/tcp/45041"
    - "/ip4/0.0.0.0/udp/45041/quic-v1"
  external_addrs: []   # e.g. ["/ip4/1.2.3.4/tcp/45041"]

registry:
  persist_db: "./data/registry.db"
  ttl_hours: 24
  http_enabled: true

relay:
  enabled: true
  max_reservations: 1000
  max_circuit_duration: "2m"

mq:
  db_path: "./data/mq.db"
  default_ttl_days: 7
  max_msgs_per_urn: 500
  http_enabled: true

api:
  listen_addr: ":8080"
  tls_cert: ""
  tls_key: ""
  admin_token: "" # Leave empty to disable admin APIs by default. Configure locally in config.yaml or override via environment variable: PLATFORM_ADMIN_TOKEN=your_token
  rate_limit_rate: 10.0 # HTTP rate limit: allowed requests per second per IP (0 to disable)
  rate_limit_burst: 20  # HTTP rate limit: maximum burst size per IP
