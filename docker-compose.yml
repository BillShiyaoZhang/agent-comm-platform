services:
  platform:
    build:
      context: ..
      dockerfile: agent-comm-platform/Dockerfile
    ports:
      - "45041:45041"
      - "45041:45041/udp"
      - "8080:8080"
    volumes:
      - ./config.example.yaml:/etc/platform/config.yaml:ro
      - platform_data:/data
    environment:
      - PLATFORM_ADMIN_TOKEN=${PLATFORM_ADMIN_TOKEN}
    restart: unless-stopped

volumes:
  platform_data:
